        error_count:
          type: integer
          format: int64
          description: HTTP 4xx/5xx 请求总数
        in_flight:
          type: integer
          format: int64
          description: 当前处理中请求数
        avg_duration_ms:
          type: number
          format: double
          description: 平均请求耗时毫秒
        status_counts:
          type: object
          additionalProperties:
            type: integer
            format: int64
          description: 按 HTTP 状态码统计的请求数
        uptime_seconds:
          type: integer
          format: int64
          description: 进程运行秒数
        collected_at:
          type: string
          format: date-time
          description: 指标采集时间

