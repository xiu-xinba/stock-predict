openapi: 3.0.3

info:
  title: 股票/基金行情平台 API
  description: 股票与基金行情平台后端服务接口文档，提供基金搜索、股票搜索和市场行情等功能；旧预测路径仅作为已废弃兼容端点保留。错误码体系参见 ErrorCode schema。
  version: 1.0.0

servers:
  - url: http://localhost:5070
    description: 本地开发服务器

tags:
  - name: 系统
    description: 系统健康检查
  - name: 搜索
    description: 统一搜索
  - name: 基金
    description: 基金相关接口
  - name: 股票
    description: 股票相关接口
  - name: 市场
    description: 市场行情接口
  - name: 预测
    description: 已迁移预测服务的废弃兼容端点
  - name: 自选股
    description: 自选股行情接口

security: []

paths:
  /api/v1/health:
    get:
      tags: [系统]
      summary: 就绪检查（兼容路径）
      description: 检查数据库连接并返回服务与数据加载状态；数据库不可用时返回 503。
      operationId: health
      responses:
        "200":
          description: 服务健康状态
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/HealthData"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/v1/health/live:
    get:
      tags: [系统]
      summary: 存活检查
      operationId: liveness
      responses:
        "200":
          description: 进程正在运行

  /api/v1/health/ready:
    get:
      tags: [系统]
      summary: 就绪检查
      operationId: readiness
      responses:
        "200":
          description: 数据库连接可用
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/v1/metrics:
    get:
      tags: [系统]
      summary: 运行指标
      description: 返回进程内最小运行指标，包括请求数、错误数、状态码分布、平均耗时和运行时间。
      operationId: metrics
      security:
        - adminToken: []
      responses:
        "200":
          description: 运行指标快照
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/MetricsData"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/search:
    get:
      tags: [搜索]
      summary: 统一搜索
      description: 同时搜索基金和股票，返回匹配结果
      operationId: unifiedSearch
      parameters:
        - name: q
          in: query
          required: true
          description: 搜索关键词
          schema:
            type: string
            maxLength: 100
        - name: types
          in: query
          required: false
          description: 搜索类型，逗号分隔，可选值为 fund、stock，为空时搜索全部
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: 页码，默认1
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: size
          in: query
          required: false
          description: 每页数量，默认10，最大50
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
      responses:
        "200":
          description: 搜索结果
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UnifiedSearchResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/funds/search:
    get:
      tags: [基金]
      summary: 基金搜索
      description: 根据条件搜索基金列表，支持关键词、类型、公司等多维度筛选
      operationId: searchFunds
      parameters:
        - name: keyword
          in: query
          required: false
          description: 搜索关键词（基金代码或名称）
          schema:
            type: string
        - name: type
          in: query
          required: false
          description: 基金类型筛选
          schema:
            type: string
        - name: company
          in: query
          required: false
          description: 基金公司筛选
          schema:
            type: string
        - name: risk_level
          in: query
          required: false
          description: 风险等级筛选
          schema:
            type: string
        - name: manager
          in: query
          required: false
          description: 基金经理筛选
          schema:
            type: string
        - name: return_min
          in: query
          required: false
          description: 收益率下限
          schema:
            type: number
            format: double
        - name: return_max
          in: query
          required: false
          description: 收益率上限
          schema:
            type: number
            format: double
        - name: sort_by
          in: query
          required: false
          description: 排序字段
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: 排序方向（asc/desc）
          schema:
            type: string
            enum: [asc, desc]
        - name: page
          in: query
          required: false
          description: 页码
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: size
          in: query
          required: false
          description: 每页数量
          schema:
            type: integer
            minimum: 1
            default: 20
      responses:
        "200":
          description: 基金搜索结果
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/FundSearchData"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/funds/filters:
    get:
      tags: [基金]
      summary: 基金筛选选项
      description: 获取基金可用的筛选维度，包括基金类型、基金公司、风险等级
      operationId: fundFilters
      responses:
        "200":
          description: 基金筛选选项
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/FundFilters"

  /api/v1/funds/coverage:
    get:
      tags: [基金]
      summary: 基金覆盖率报告
      description: 返回基金数据覆盖率统计，包括行情覆盖和基金类型分布等
      operationId: fundCoverage
      responses:
        "200":
          description: 基金覆盖率报告
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/CoverageReport"

  /api/v1/funds/sync:
    post:
      tags: [基金]
      summary: 同步基金数据
      description: 从配置的数据源同步基金数据，需要管理员令牌认证
      operationId: syncFunds
      security:
        - adminToken: []
          csrfCookie: []
          csrfHeader: []
      responses:
        "200":
          description: 同步结果
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/FundSyncResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/market/indices:
    get:
      tags: [市场]
      summary: 市场指数行情
      description: 获取主要市场指数（上证、深证、创业板等）的实时行情数据
      operationId: marketIndices
      responses:
        "200":
          description: 市场指数列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/MarketIndex"

  /api/v1/market/ranking/{type}:
    get:
      tags: [市场]
      summary: 基金排行榜
      description: 获取基金涨幅或跌幅排行榜
      operationId: marketRanking
      parameters:
        - name: type
          in: path
          required: true
          description: 排行类型，gainers为涨幅榜，losers为跌幅榜
          schema:
            type: string
            enum: [gainers, losers]
        - name: size
          in: query
          required: false
          description: 返回数量，默认10
          schema:
            type: integer
            minimum: 1
            default: 10
      responses:
        "200":
          description: 基金排行列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/FundRankingItem"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/market/index/{code}/kline:
    get:
      tags: [市场]
      summary: 指数 K 线
      description: 获取指定市场指数的历史 K 线数据
      operationId: indexKline
      parameters:
        - name: code
          in: path
          required: true
          description: 指数代码
          schema:
            type: string
        - name: count
          in: query
          required: false
          description: 返回条数，默认 120，最大 500
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 120
      responses:
        "200":
          description: 指数 K 线数据
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/IndexKlinePoint"
        "400":
          $ref: "#/components/responses/BadRequest"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/v1/market/index/{code}/minute:
    get:
      tags: [市场]
      summary: 指数分时
      description: 获取指定市场指数的当日分时数据
      operationId: indexMinute
      parameters:
        - name: code
          in: path
          required: true
          description: 指数代码
          schema:
            type: string
      responses:
        "200":
          description: 指数分时数据
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/IndexMinutePoint"
        "400":
          $ref: "#/components/responses/BadRequest"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/v1/market/sectors:
    get:
      tags: [市场]
      summary: 板块热度
      description: 获取市场板块涨跌幅、上涨/下跌家数和领涨股
      operationId: sectorRanking
      responses:
        "200":
          description: 板块热度列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/MarketSectorItem"

  /api/v1/market/northbound:
    get:
      tags: [市场]
      summary: 北向资金
      description: 获取沪股通、深股通及合计净买入和分时流向
      operationId: northboundFlow
      responses:
        "200":
          description: 北向资金流向
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/NorthboundFlow"

  /api/v1/market/sync-status:
    get:
      tags: [市场]
      summary: 市场同步状态
      description: 返回市场同步后台任务状态、数据源健康状态和本地缓存统计
      operationId: syncStatus
      responses:
        "200":
          description: 市场同步状态
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/MarketSyncStatus"

  /api/v1/market/health:
    get:
      tags: [市场]
      summary: 数据源健康状态
      description: 返回各行情数据源的健康状态快照
      operationId: marketHealth
      responses:
        "200":
          description: 数据源健康状态
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        additionalProperties:
                          $ref: "#/components/schemas/SourceHealth"

  /api/v1/market/health/{source}/simulate:
    post:
      tags: [市场]
      summary: 模拟数据源健康状态
      description: 诊断接口，用于模拟指定数据源的健康状态；需要管理员令牌认证。
      operationId: simulateHealth
      security:
        - adminToken: []
          csrfCookie: []
          csrfHeader: []
      parameters:
        - name: source
          in: path
          required: true
          description: 数据源名称
          schema:
            type: string
        - name: status
          in: query
          required: true
          description: 模拟状态
          schema:
            type: string
            enum: [healthy, degraded, unhealthy]
        - name: error
          in: query
          required: false
          description: 模拟错误信息
          schema:
            type: string
      responses:
        "200":
          description: 更新后的数据源健康状态
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        additionalProperties:
                          $ref: "#/components/schemas/SourceHealth"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/v1/market/health/reset:
    post:
      tags: [市场]
      summary: 重置数据源健康模拟
      description: 诊断接口，用于清除健康状态模拟；需要管理员令牌认证。
      operationId: resetHealth
      security:
        - adminToken: []
          csrfCookie: []
          csrfHeader: []
      responses:
        "200":
          description: 重置后的数据源健康状态
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        additionalProperties:
                          $ref: "#/components/schemas/SourceHealth"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/v1/predict/{fundCode}:
    get:
      tags: [预测]
      summary: 基金预测兼容端点（已废弃）
      description: 预测服务已迁移至独立项目。此路径仅为兼容旧调用保留，合法基金代码固定返回 410 Gone。
      operationId: predictFund
      deprecated: true
      parameters:
        - name: fundCode
          in: path
          required: true
          description: 基金代码，6位数字
          schema:
            type: string
            pattern: "^[0-9]{6}$"
      responses:
        "400":
          $ref: "#/components/responses/BadRequest"
        "410":
          description: 预测服务已迁移，当前端点已废弃
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIResponse"
              example:
                code: -1
                message: "预测服务已迁移，此接口已废弃"
                data: null

  /api/v1/watchlist/quotes:
    post:
      tags: [自选股]
      summary: 自选基金行情
      description: 批量获取自选基金的实时行情数据，最多支持50个基金代码
      operationId: watchlistQuotes
      security:
        - csrfCookie: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WatchlistQuoteRequest"
      responses:
        "200":
          description: 自选基金行情列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/WatchlistItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/fund/{fundCode}/detail:
    get:
      tags: [基金]
      summary: 基金详情
      description: 获取基金详细信息，包括基本信息、行情、业绩表现、基金经理、持仓、风险指标等
      operationId: fundDetail
      parameters:
        - name: fundCode
          in: path
          required: true
          description: 基金代码，6位数字
          schema:
            type: string
            pattern: "^[0-9]{6}$"
      responses:
        "200":
          description: 基金详情
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/FundDetailData"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/stocks/search:
    get:
      tags: [股票]
      summary: 股票搜索
      description: 根据条件搜索股票列表，支持关键词、行业、市场等多维度筛选
      operationId: searchStocks
      parameters:
        - name: keyword
          in: query
          required: false
          description: 搜索关键词（股票代码或名称）
          schema:
            type: string
        - name: industry
          in: query
          required: false
          description: 行业筛选
          schema:
            type: string
        - name: market
          in: query
          required: false
          description: 市场筛选（如 SH、SZ）
          schema:
            type: string
        - name: sort_by
          in: query
          required: false
          description: 排序字段
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: 排序方向（asc/desc）
          schema:
            type: string
            enum: [asc, desc]
        - name: page
          in: query
          required: false
          description: 页码
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: size
          in: query
          required: false
          description: 每页数量，最大100
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: 股票搜索结果
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/StockSearchData"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/stocks/filters:
    get:
      tags: [股票]
      summary: 股票筛选选项
      description: 获取股票可用的筛选维度，包括行业和市场
      operationId: stockFilters
      responses:
        "200":
          description: 股票筛选选项
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/StockFilters"

  /api/v1/stock/{stockCode}/detail:
    get:
      tags: [股票]
      summary: 股票详情
      description: 获取股票详细信息，包括基本信息、行情、K线、资金流向、财务数据、股东信息等
      operationId: stockDetail
      parameters:
        - name: stockCode
          in: path
          required: true
          description: 股票代码，6位数字
          schema:
            type: string
            pattern: "^[0-9]{6}$"
      responses:
        "200":
          description: 股票详情
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/StockDetailData"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/stock/{stockCode}/minute:
    get:
      tags: [股票]
      summary: 股票分时
      description: 获取指定股票的当日分时数据
      operationId: stockMinute
      parameters:
        - name: stockCode
          in: path
          required: true
          description: 股票代码，6位数字
          schema:
            type: string
            pattern: "^[0-9]{6}$"
      responses:
        "200":
          description: 股票分时数据
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/IndexMinutePoint"
        "400":
          $ref: "#/components/responses/BadRequest"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/v1/stock/{stockCode}/predict:
    get:
      tags: [预测]
      summary: 股票预测兼容端点（已废弃）
      description: 预测服务已迁移至独立项目。此路径仅为兼容旧调用保留，合法股票代码固定返回 410 Gone。
      operationId: predictStock
      deprecated: true
      parameters:
        - name: stockCode
          in: path
          required: true
          description: 股票代码，6位数字
          schema:
            type: string
            pattern: "^[0-9]{6}$"
      responses:
        "400":
          $ref: "#/components/responses/BadRequest"
        "410":
          description: 预测服务已迁移，当前端点已废弃
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIResponse"
              example:
                code: -1
                message: "预测服务已迁移，此接口已废弃"
                data: null

  /api/v1/stocks/quotes:
    post:
      tags: [股票]
      summary: 批量股票行情
      description: 批量获取股票行情数据，最多支持50个股票代码；可通过 freshness 选择平衡缓存或实时优先策略
      operationId: stockQuotes
      security:
        - csrfCookie: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StockQuoteRequest"
      responses:
        "200":
          description: 股票行情数据
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        additionalProperties:
                          $ref: "#/components/schemas/StockQuote"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/market/stock-ranking/{type}:
    get:
      tags: [市场]
      summary: 股票排行榜
      description: 获取股票涨幅、跌幅或成交量排行榜
      operationId: stockRanking
      parameters:
        - name: type
          in: path
          required: true
          description: 排行类型，gainers为涨幅榜，losers为跌幅榜，volume为成交量榜
          schema:
            type: string
            enum: [gainers, losers, volume]
        - name: size
          in: query
          required: false
          description: 返回数量，默认10
          schema:
            type: integer
            minimum: 1
            default: 10
      responses:
        "200":
          description: 股票排行列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/StockRankingItem"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/stocks/sync:
    post:
      tags: [股票]
      summary: 同步股票数据
      description: 从数据源同步股票数据，需要管理员令牌认证
      operationId: syncStocks
      security:
        - adminToken: []
          csrfCookie: []
          csrfHeader: []
      responses:
        "200":
          description: 同步结果
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/StockSyncResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

components:
  securitySchemes:
    adminToken:
      type: http
      scheme: bearer
      description: 管理员令牌，通过 Authorization 请求头传递 Bearer Token
    csrfCookie:
      type: apiKey
      in: cookie
      name: csrf_token
      description: 先通过任意 GET 请求获取 HttpOnly CSRF Cookie
    csrfHeader:
      type: apiKey
      in: header
      name: X-CSRF-Token
      description: 使用 GET 响应头返回的令牌，值必须与 csrf_token Cookie 一致

  schemas:
    APIResponse:
      type: object
      description: 通用API响应包装
      properties:
        code:
          type: integer
          description: 状态码，0表示成功，正数为业务错误码，-1为通用错误
          example: 0
        message:
          type: string
          description: 状态消息
          example: success
        data:
          description: 响应数据

    ErrorCode:
      type: object
      description: 业务错误码定义
      properties:
        code:
          type: integer
          description: 业务错误码
        message:
          type: string
          description: 错误描述
        http_status:
          type: integer
          description: 对应HTTP状态码
      example:
        code: 10001
        message: 无效的基金代码
        http_status: 400

    HealthData:
      type: object
      description: 健康检查数据
      properties:
        status:
          type: string
          description: 服务状态
          example: ok
        model_loaded:
          type: boolean
          description: 预测模型已拆分为独立项目，当前固定为 false
        funds_loaded:
          type: boolean
          description: 基金数据是否已加载
        stocks_loaded:
          type: boolean
          description: 股票数据是否已加载
        runtime:
          type: string
          description: 运行时环境
          example: go

    MetricsData:
