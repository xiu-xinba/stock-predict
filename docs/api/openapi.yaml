            pattern: "^[0-9]{6}$"
          minItems: 1
          maxItems: 50
          description: 股票代码列表，每个代码为6位纯数字，最多50个
        freshness:
          type: string
          enum: [balanced, realtime]
          default: balanced
          description: 行情新鲜度策略；balanced 使用较长缓存窗口，realtime 使用短 TTL 与后台刷新

