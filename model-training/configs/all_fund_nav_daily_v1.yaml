feature_set: all_fund_nav_daily_v1
target_column: label_1d
secondary_targets:
  - label_1w
fund_daily_path: data/processed/all_fund_daily.csv
output_dir: models/all_fund_nav_daily_v1
train:
  test_size: 0.2
  n_estimators: 300
  max_depth: 6
  learning_rate: 0.05
  min_child_weight: 10
  subsample: 0.8
  colsample_bytree: 0.8
  early_stopping_rounds: 50
  purged_split_gap_days: 1
admission:
  min_samples: 120
  max_stale_days: 10
  exclude_fund_types:
    - 货币型
    - 货币市场型
