universe_path: configs/index_fund_universe.example.csv
raw_dir: data/raw/public_mvp_intraday
history_dir: data/processed/intraday_history
panic_factor_path: data/processed/public_mvp_panic_factor.csv
samples_output_path: data/processed/public_mvp_intraday_index_fund_samples.csv
report_output_path: reports/public_mvp_index_fund_intraday_tournament_report.json
metadata_output_path: artifacts/public_mvp_index_fund_intraday_tournament_metadata.json
champion_output_path: artifacts/public_mvp_index_fund_intraday_tournament_champion.joblib
summary_output_path: reports/public_mvp_intraday_pipeline_summary.json
period: "1"
horizon_minutes: 5
max_funds: 4
continue_on_error: true
skip_existing: false
flat_threshold_pct: 0.02
high_confidence_threshold: 0.60
purged_split: true
embargo_minutes: 5
rolling_backtest_folds: 3
rolling_backtest_min_train_rows: 500
rolling_backtest_min_test_rows: 100
candidates:
  - lightgbm
  - hist_gbdt
  - random_forest
  - extra_trees
  - gradient_boosting
  - logistic_ridge
ablation_tests:
  - full_feature_model
  - without_panic_factor
  - without_index_features
promotion:
  registry_dir: model_registry
  min_balanced_accuracy: 0.34
  max_regression_mae: 0.12
  min_high_confidence_accuracy: 0.50
  min_high_confidence_coverage: 0.02
  min_train_rows: 500
  min_test_rows: 100
  min_calendar_days: 3
  min_score_delta: 0.0
  min_rolling_backtest_folds: 3
  min_rolling_balanced_accuracy: 0.30
  max_high_confidence_accuracy_drop: 0.0
  max_high_confidence_coverage_drop: 0.0
  min_market_regime_slice_rows: 20
  min_market_regime_accuracy: 0.30
  mae_weight: 0.05
  allow_lower_score: false
