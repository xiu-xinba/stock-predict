task: intraday_5m
data_path: data/processed/intraday_5m_samples.csv
model_output_path: artifacts/intraday_5m.onnx
metadata_output_path: artifacts/intraday_5m_metadata.json
report_output_path: reports/intraday_5m_report.json
feature_set: extended_v1
label_column: label
future_return_column: future_return_pct_5m
flat_threshold_pct: 0.01
test_size: 0.2
random_seed: 20260523
lightgbm:
  n_estimators: 600
  learning_rate: 0.02
  num_leaves: 31
  max_depth: -1
  min_child_samples: 80
  subsample: 0.9
  colsample_bytree: 0.9
  reg_alpha: 0.08
  reg_lambda: 0.20
