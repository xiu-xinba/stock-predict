openapi: 3.0.3

info:
  title: 股票/基金预测平台 API
  description: 股票与基金预测平台后端服务接口文档，提供基金搜索、股票搜索、市场行情、预测分析等功能。
  version: 1.0.0

servers:
  - url: http://localhost:5070
    description: 本地开发服务器

tags:
  - name: 系统
    description: 系统健康检查
  - name: 搜索
    description: 统一搜索
  - name: 基金
    description: 基金相关接口
  - name: 股票
    description: 股票相关接口
  - name: 市场
    description: 市场行情接口
  - name: 预测
    description: 预测分析接口
  - name: 自选股
    description: 自选股行情接口

security: []

paths:
  /api/v1/health:
    get:
      tags: [系统]
      summary: 健康检查
      description: 返回服务运行状态，包括模型加载情况、基金/股票数据加载情况
      operationId: health
      responses:
        "200":
          description: 服务健康状态
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/HealthData"

  /api/v1/search:
    get:
      tags: [搜索]
      summary: 统一搜索
      description: 同时搜索基金和股票，返回匹配结果
      operationId: unifiedSearch
      parameters:
        - name: q
          in: query
          required: true
          description: 搜索关键词
          schema:
            type: string
            maxLength: 100
        - name: types
          in: query
          required: false
          description: 搜索类型，逗号分隔，可选值为 fund、stock，为空时搜索全部
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: 页码，默认1
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: size
          in: query
          required: false
          description: 每页数量，默认10，最大50
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
      responses:
        "200":
          description: 搜索结果
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UnifiedSearchResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/funds/search:
    get:
      tags: [基金]
      summary: 基金搜索
      description: 根据条件搜索基金列表，支持关键词、类型、公司等多维度筛选
      operationId: searchFunds
      parameters:
        - name: keyword
          in: query
          required: false
          description: 搜索关键词（基金代码或名称）
          schema:
            type: string
        - name: type
          in: query
          required: false
          description: 基金类型筛选
          schema:
            type: string
        - name: company
          in: query
          required: false
          description: 基金公司筛选
          schema:
            type: string
        - name: risk_level
          in: query
          required: false
          description: 风险等级筛选
          schema:
            type: string
        - name: manager
          in: query
          required: false
          description: 基金经理筛选
          schema:
            type: string
        - name: return_min
          in: query
          required: false
          description: 收益率下限
          schema:
            type: number
            format: double
        - name: return_max
          in: query
          required: false
          description: 收益率上限
          schema:
            type: number
            format: double
        - name: sort_by
          in: query
          required: false
          description: 排序字段
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: 排序方向（asc/desc）
          schema:
            type: string
            enum: [asc, desc]
        - name: page
          in: query
          required: false
          description: 页码
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: size
          in: query
          required: false
          description: 每页数量
          schema:
            type: integer
            minimum: 1
            default: 20
      responses:
        "200":
          description: 基金搜索结果
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/FundSearchData"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/funds/filters:
    get:
      tags: [基金]
      summary: 基金筛选选项
      description: 获取基金可用的筛选维度，包括基金类型、基金公司、风险等级
      operationId: fundFilters
      responses:
        "200":
          description: 基金筛选选项
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/FundFilters"

  /api/v1/funds/coverage:
    get:
      tags: [基金]
      summary: 基金覆盖率报告
      description: 返回基金数据覆盖率统计，包括行情覆盖、历史数据覆盖、模型支持情况等
      operationId: fundCoverage
      responses:
        "200":
          description: 基金覆盖率报告
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/CoverageReport"

  /api/v1/funds/sync:
    post:
      tags: [基金]
      summary: 同步基金数据
      description: 从配置的数据源同步基金数据，需要管理员令牌认证
      operationId: syncFunds
      security:
        - adminToken: []
      responses:
        "200":
          description: 同步结果
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/FundSyncResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/market/indices:
    get:
      tags: [市场]
      summary: 市场指数行情
      description: 获取主要市场指数（上证、深证、创业板等）的实时行情数据
      operationId: marketIndices
      responses:
        "200":
          description: 市场指数列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/MarketIndex"

  /api/v1/market/ranking/{type}:
    get:
      tags: [市场]
      summary: 基金排行榜
      description: 获取基金涨幅或跌幅排行榜
      operationId: marketRanking
      parameters:
        - name: type
          in: path
          required: true
          description: 排行类型，gainers为涨幅榜，losers为跌幅榜
          schema:
            type: string
            enum: [gainers, losers]
        - name: size
          in: query
          required: false
          description: 返回数量，默认10
          schema:
            type: integer
            minimum: 1
            default: 10
      responses:
        "200":
          description: 基金排行列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/FundRankingItem"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/predict/{fundCode}:
    get:
      tags: [预测]
      summary: 基金预测
      description: 根据基金代码获取预测分析结果，包括日度、周度、日内预测及数据质量评估
      operationId: predictFund
      parameters:
        - name: fundCode
          in: path
          required: true
          description: 基金代码，6位数字
          schema:
            type: string
            pattern: "^[0-9]{6}$"
      responses:
        "200":
          description: 基金预测结果
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PredictionData"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/watchlist/quotes:
    post:
      tags: [自选股]
      summary: 自选基金行情
      description: 批量获取自选基金的实时行情数据，最多支持50个基金代码
      operationId: watchlistQuotes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WatchlistQuoteRequest"
      responses:
        "200":
          description: 自选基金行情列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/WatchlistItem"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/fund/{fundCode}/detail:
    get:
      tags: [基金]
      summary: 基金详情
      description: 获取基金详细信息，包括基本信息、行情、业绩表现、基金经理、持仓、风险指标等
      operationId: fundDetail
      parameters:
        - name: fundCode
          in: path
          required: true
          description: 基金代码，6位数字
          schema:
            type: string
            pattern: "^[0-9]{6}$"
      responses:
        "200":
          description: 基金详情
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/FundDetailData"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/stocks/search:
    get:
      tags: [股票]
      summary: 股票搜索
      description: 根据条件搜索股票列表，支持关键词、行业、市场等多维度筛选
      operationId: searchStocks
      parameters:
        - name: keyword
          in: query
          required: false
          description: 搜索关键词（股票代码或名称）
          schema:
            type: string
        - name: industry
          in: query
          required: false
          description: 行业筛选
          schema:
            type: string
        - name: market
          in: query
          required: false
          description: 市场筛选（如 SH、SZ）
          schema:
            type: string
        - name: sort_by
          in: query
          required: false
          description: 排序字段
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: 排序方向（asc/desc）
          schema:
            type: string
            enum: [asc, desc]
        - name: page
          in: query
          required: false
          description: 页码
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: size
          in: query
          required: false
          description: 每页数量，最大100
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: 股票搜索结果
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/StockSearchData"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/stocks/filters:
    get:
      tags: [股票]
      summary: 股票筛选选项
      description: 获取股票可用的筛选维度，包括行业和市场
      operationId: stockFilters
      responses:
        "200":
          description: 股票筛选选项
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/StockFilters"

  /api/v1/stock/{stockCode}/detail:
    get:
      tags: [股票]
      summary: 股票详情
      description: 获取股票详细信息，包括基本信息、行情、K线、资金流向、财务数据、股东信息等
      operationId: stockDetail
      parameters:
        - name: stockCode
          in: path
          required: true
          description: 股票代码，6位数字
          schema:
            type: string
            pattern: "^[0-9]{6}$"
      responses:
        "200":
          description: 股票详情
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/StockDetailData"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/stock/{stockCode}/predict:
    get:
      tags: [预测]
      summary: 股票预测
      description: 根据股票代码获取预测分析结果，包括日度、周度、日内预测
      operationId: predictStock
      parameters:
        - name: stockCode
          in: path
          required: true
          description: 股票代码，6位数字
          schema:
            type: string
            pattern: "^[0-9]{6}$"
      responses:
        "200":
          description: 股票预测结果
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/StockPredictionData"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/stocks/quotes:
    post:
      tags: [股票]
      summary: 批量股票行情
      description: 批量获取股票实时行情数据，最多支持50个股票代码
      operationId: stockQuotes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StockQuoteRequest"
      responses:
        "200":
          description: 股票行情数据
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        additionalProperties:
                          $ref: "#/components/schemas/StockQuote"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/market/stock-ranking/{type}:
    get:
      tags: [市场]
      summary: 股票排行榜
      description: 获取股票涨幅、跌幅或成交量排行榜
      operationId: stockRanking
      parameters:
        - name: type
          in: path
          required: true
          description: 排行类型，gainers为涨幅榜，losers为跌幅榜，volume为成交量榜
          schema:
            type: string
            enum: [gainers, losers, volume]
        - name: size
          in: query
          required: false
          description: 返回数量，默认10
          schema:
            type: integer
            minimum: 1
            default: 10
      responses:
        "200":
          description: 股票排行列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/StockRankingItem"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/stocks/sync:
    post:
      tags: [股票]
      summary: 同步股票数据
      description: 从数据源同步股票数据，需要管理员令牌认证
      operationId: syncStocks
      security:
        - adminToken: []
      responses:
        "200":
          description: 同步结果
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/StockSyncResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

components:
  securitySchemes:
    adminToken:
      type: http
      scheme: bearer
      description: 管理员令牌，通过 Authorization 请求头传递 Bearer Token

  schemas:
    APIResponse:
      type: object
      description: 通用API响应包装
      properties:
        code:
          type: integer
          description: 状态码，0表示成功，-1表示业务错误
          example: 0
        message:
          type: string
          description: 状态消息
          example: success
        data:
          description: 响应数据

    HealthData:
      type: object
      description: 健康检查数据
      properties:
        status:
          type: string
          description: 服务状态
          example: ok
        model_loaded:
          type: boolean
          description: 预测模型是否已加载
        funds_loaded:
          type: boolean
          description: 基金数据是否已加载
        stocks_loaded:
          type: boolean
          description: 股票数据是否已加载
        runtime:
          type: string
          description: 运行时环境
          example: go

    FundItem:
      type: object
      description: 基金基本信息
      properties:
        fund_code:
          type: string
          description: 基金代码
          example: "000001"
        fund_name:
          type: string
          description: 基金名称
          example: 华夏成长混合
        fund_type:
          type: string
          description: 基金类型
          example: 混合型
        pinyin_abbr:
          type: string
          description: 拼音缩写
        pinyin_full:
          type: string
          description: 拼音全拼
        company:
          type: string
          description: 基金公司
        manager:
          type: string
          description: 基金经理
        latest_nav:
          type: number
          format: double
          description: 最新净值
        cumulative_nav:
          type: number
          format: double
          description: 累计净值
        return_1m:
          type: number
          format: double
          description: 近1月收益率
        return_3m:
          type: number
          format: double
          description: 近3月收益率
        return_6m:
          type: number
          format: double
          description: 近6月收益率
        return_1y:
          type: number
          format: double
          description: 近1年收益率
        return_3y:
          type: number
          format: double
          description: 近3年收益率
        risk_level:
          type: string
          description: 风险等级
        inception_date:
          type: string
          description: 成立日期
        quote_date:
          type: string
          description: 行情日期
        quote_source:
          type: string
          description: 行情来源

    FundSearchData:
      type: object
      description: 基金搜索结果
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/FundItem"
        total:
          type: integer
          description: 总数
        page:
          type: integer
          description: 当前页码
        size:
          type: integer
          description: 每页数量

    FundFilters:
      type: object
      description: 基金筛选选项
      properties:
        types:
          type: array
          items:
            type: string
          description: 基金类型列表
        companies:
          type: array
          items:
            type: string
          description: 基金公司列表
        risk_levels:
          type: array
          items:
            type: string
          description: 风险等级列表

    CoverageReport:
      type: object
      description: 基金覆盖率报告
      properties:
        total_funds:
          type: integer
          description: 基金总数
        funds_with_quote:
          type: integer
          description: 有行情数据的基金数
        funds_with_history:
          type: integer
          description: 有历史数据的基金数
        funds_with_trainable_samples:
          type: integer
          description: 有可训练样本的基金数
        model_supported_funds:
          type: integer
          description: 模型支持的基金数
        baseline_only_funds:
          type: integer
          description: 仅基线预测的基金数
        unsupported_funds:
          type: integer
          description: 不支持的基金数
        counts_by_fund_type:
          type: object
          additionalProperties:
            type: integer
          description: 按基金类型统计
        counts_by_quote_source:
          type: object
          additionalProperties:
            type: integer
          description: 按行情来源统计
        sample_cutoff_time:
          type: string
          description: 样本截止时间

    FundSyncResult:
      type: object
      description: 基金同步结果
      properties:
        source:
          type: string
          description: 数据来源
        stored_path:
          type: string
          description: 存储路径
        imported:
          type: integer
          description: 导入数量
        total:
          type: integer
          description: 总数量
        updated_at:
          type: string
          description: 更新时间

    FundRankingItem:
      type: object
      description: 基金排行项
      properties:
        rank:
          type: integer
          description: 排名
        fund_code:
          type: string
          description: 基金代码
        fund_name:
          type: string
          description: 基金名称
        fund_type:
          type: string
          description: 基金类型
        change_pct:
          type: number
          format: double
          description: 涨跌幅百分比
        estimated_nav:
          type: number
          format: double
          description: 估算净值
        quote_date:
          type: string
          description: 行情日期
        quote_source:
          type: string
          description: 行情来源

    WatchlistQuoteRequest:
      type: object
      description: 自选基金行情请求
      required:
        - codes
      properties:
        codes:
          type: array
          items:
            type: string
            pattern: "^[0-9]{6}$"
          minItems: 1
          maxItems: 50
