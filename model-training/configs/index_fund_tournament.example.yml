project: index_fund_prediction_tournament
created_at: 2026-05-23

universe:
  primary_focus:
    - cn_broad_index_funds
    - cn_sector_index_funds
    - cn_etf_lof
    - hk_index_funds
    - qdii_index_funds
  first_batch_tracking_indexes:
    cn:
      - CSI300
      - SSE50
      - CSI500
      - CSI1000
      - ChiNext
      - STAR50
      - Dividend
      - Consumer
      - Healthcare
      - NewEnergy
      - Semiconductor
    hk:
      - HSI
      - HSCEI
      - HSTECH
    global:
      - NASDAQ100
      - SP500
      - Gold
      - CrudeOil

horizons:
  daily_weekly:
    targets:
      - return_1d
      - return_1w
      - direction_1d
      - direction_1w
      - tracking_error_1d
      - tracking_error_1w
    label_table: label_daily_weekly
    validation:
      split: walk_forward
      high_confidence_metrics:
        - direction_accuracy
        - smape
        - interval_coverage
        - coverage
  intraday:
    targets:
      - return_3m
      - return_5m
      - direction_3m
      - direction_5m
    label_table: label_intraday
    validation:
      split: purged_walk_forward
      embargo_minutes: 5
      high_confidence_metrics:
        - direction_accuracy
        - cost_adjusted_return
        - max_drawdown
        - coverage

feature_groups:
  index_fund_core:
    tables:
      - dim_fund
      - fund_daily
      - fund_intraday
      - index_daily
      - index_intraday
      - index_constituent
      - stock_daily_intraday
  futures_options_commodity:
    tables:
      - futures_bar
      - option_volatility
      - commodity_bar
  macro_cross_market:
    tables:
      - macro_rate_fx
      - cross_market
      - capital_flow
  sentiment_panic:
    tables:
      - sentiment_event
      - panic_factor

daily_weekly_candidates:
  - name: tft_daily_weekly
    family: temporal_fusion_transformer
    role: champion_candidate
    feature_groups:
      - index_fund_core
      - futures_options_commodity
      - macro_cross_market
      - sentiment_panic
  - name: patchtst_daily_weekly
    family: patchtst
    role: champion_candidate
    feature_groups:
      - index_fund_core
      - futures_options_commodity
      - macro_cross_market
  - name: itransformer_daily_weekly
    family: itransformer
    role: champion_candidate
    feature_groups:
      - index_fund_core
      - futures_options_commodity
      - macro_cross_market
  - name: timesnet_timemixer_daily_weekly
    family: timesnet_or_timemixer
    role: challenger
    feature_groups:
      - index_fund_core
      - futures_options_commodity
      - macro_cross_market
      - sentiment_panic
  - name: temporal_gnn_daily_weekly
    family: temporal_graph_neural_network
    role: challenger
    feature_groups:
      - index_fund_core
      - futures_options_commodity
  - name: gbdt_daily_weekly
    family: catboost_xgboost_lightgbm
    role: baseline_and_stacking_member
    feature_groups:
      - index_fund_core
      - futures_options_commodity
      - macro_cross_market
      - sentiment_panic

intraday_candidates:
  - name: deeplob_intraday
    family: deeplob
    role: champion_candidate
    feature_groups:
      - index_fund_core
      - futures_options_commodity
      - sentiment_panic
  - name: lobtransformer_intraday
    family: lobtransformer
    role: champion_candidate
    feature_groups:
      - index_fund_core
      - futures_options_commodity
      - sentiment_panic
  - name: tcn_intraday
    family: tcn
    role: low_latency_candidate
    feature_groups:
      - index_fund_core
      - futures_options_commodity
  - name: gbdt_intraday
    family: catboost_xgboost_lightgbm
    role: baseline_and_stacking_member
    feature_groups:
      - index_fund_core
      - futures_options_commodity
      - sentiment_panic

ablation_tests:
  - full_feature_model
  - without_panic_factor
  - without_futures_commodity
  - without_sentiment
  - without_cross_market

promotion_rules:
  champion_required_checks:
    - beats_naive_baseline
    - walk_forward_stable
    - no_major_regime_shortfall
    - calibration_not_worse
    - high_confidence_coverage_not_collapsed
    - shadow_run_passed
