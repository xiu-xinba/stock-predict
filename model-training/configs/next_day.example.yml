task: next_day
data_path: data/processed/next_day_samples.csv
model_output_path: ../backend-go/models/model_v1.onnx
metadata_output_path: artifacts/next_day_metadata.json
report_output_path: reports/next_day_report.json
feature_set: backend_v1
label_column: label
future_return_column: future_return_pct_next_day
flat_threshold_pct: 0.05
test_size: 0.2
random_seed: 20260523
lightgbm:
  n_estimators: 400
  learning_rate: 0.03
  num_leaves: 31
  max_depth: -1
  min_child_samples: 40
  subsample: 0.85
  colsample_bytree: 0.85
  reg_alpha: 0.05
  reg_lambda: 0.15
