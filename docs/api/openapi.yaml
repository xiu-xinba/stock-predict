          description: 搜索建议

  responses:
    BadRequest:
      description: 请求参数错误
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIResponse"
          example:
            code: -1
            message: "查询参数格式错误"
            data: null

    Unauthorized:
      description: 未授权，管理员令牌无效或缺失
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIResponse"
          example:
            code: -1
            message: "未提供管理员令牌"
            data: null

    NotFound:
      description: 资源未找到
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIResponse"
          example:
            code: -1
            message: "not found"
            data: null

    InternalServerError:
      description: 服务器内部错误
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIResponse"
          example:
            code: -1
            message: "服务器内部错误"
            data: null
